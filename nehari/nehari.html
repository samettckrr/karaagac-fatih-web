<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nehari Hizmeti | Karaağaç Fatih</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <link rel="stylesheet" href="../css/app-shell.css" />

  <style>
    body {
      padding-top: var(--appbar-h) !important;
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 15px;
    }

    main.container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 24px 32px;
      box-sizing: border-box;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--stroke);
      padding: 48px 24px;
      box-shadow: var(--shadow);
      min-height: 280px;
    }

    .hero h1 {
      margin: 0 0 16px;
      font-size: 26px;
      color: var(--text);
    }

    .hero-message {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
      max-width: 520px;
    }

    .nehari-sekmeler {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 24px 0;
      justify-content: center;
    }
    .nehari-sekmeler .sekme-btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: var(--card);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .nehari-sekmeler .sekme-btn:hover {
      border-color: var(--brand);
      background: var(--surface);
      transform: translateY(-1px);
    }
    .nehari-sekmeler .sekme-btn.aktif {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #fff;
      border-color: var(--brand);
    }
    .sekme-icerik {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--stroke);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-top: 24px;
      overflow-x: auto;
    }
    .sekme-icerik table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .sekme-icerik th, .sekme-icerik td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--stroke); }
    .sekme-icerik th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .sekme-icerik .loading, .sekme-icerik .bos { color: var(--muted); text-align: center; padding: 40px; }
    .sekme-icerik .hata { color: var(--bad, #ef4444); text-align: center; padding: 24px; }

    /* Talebe: Sınıf renkleri (1–12) */
    .badge-sinif { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .sinif-1 { background: #dbeafe; color: #1e40af; }
    .sinif-2 { background: #d1fae5; color: #065f46; }
    .sinif-3 { background: #fef3c7; color: #92400e; }
    .sinif-4 { background: #fce7f3; color: #9d174d; }
    .sinif-5 { background: #e0e7ff; color: #3730a3; }
    .sinif-6 { background: #cffafe; color: #0e7490; }
    .sinif-7 { background: #ddd6fe; color: #5b21b6; }
    .sinif-8 { background: #fed7aa; color: #c2410c; }
    .sinif-9 { background: #bbf7d0; color: #166534; }
    .sinif-10 { background: #fbcfe8; color: #be185d; }
    .sinif-11 { background: #bfdbfe; color: #1d4ed8; }
    .sinif-12 { background: #a7f3d0; color: #047857; }
    .sinif-0 { background: var(--surface); color: var(--muted); }

    /* Talebe: Durum (Aktif/Pasif) */
    .badge-durum { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .durum-aktif { background: #d1fae5; color: #065f46; }
    .durum-pasif { background: #f3f4f6; color: #6b7280; }

    /* Aidat: Durum (Tam/Eksik/Alınmadı) */
    .badge-aidat { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .aidat-tam { background: #d1fae5; color: #065f46; }
    .aidat-eksik { background: #fef3c7; color: #92400e; }
    .aidat-alinmadi { background: #fee2e2; color: #b91c1c; }

    /* Yoklama: 3 seçenek butonları */
    .yoklama-baslik { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .yoklama-tarih { font-weight: 600; color: var(--text); }
    .yoklama-satir { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--stroke); flex-wrap: wrap; }
    .yoklama-satir:last-child { border-bottom: none; }
    .yoklama-satir .ad-soyad { font-weight: 600; min-width: 140px; flex-shrink: 0; }
    .yoklama-satir .sinif-badge { margin-left: 4px; }
    .yoklama-secenekler { display: flex; gap: 8px; flex-wrap: wrap; }
    .yoklama-opt { padding: 8px 16px; border-radius: 10px; border: 2px solid var(--stroke); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .yoklama-opt:hover { border-color: var(--brand); background: var(--card); }
    .yoklama-opt.secili-geldi { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .yoklama-opt.secili-gelmedi { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .yoklama-opt.secili-izinli { background: #e0e7ff; border-color: #6366f1; color: #3730a3; }

    /* Masaüstü: tam genişlik */
    @media (min-width: 768px) {
      main.container { padding: 32px 40px; }
    }

    /* Mobil: kart görünümü ve kullanışlı düzen */
    @media (max-width: 767px) {
      main.container { padding: 16px; }
      .hero {
        min-height: auto;
        padding: 28px 16px;
      }
      .hero h1 { font-size: 22px; }
      .hero-message { font-size: 15px; }
      .nehari-sekmeler {
        flex-direction: column;
        gap: 10px;
        margin: 16px 0;
      }
      .nehari-sekmeler .sekme-btn {
        width: 100%;
        padding: 14px 20px;
        text-align: center;
        font-size: 16px;
      }
      .sekme-icerik {
        padding: 16px;
        margin-top: 16px;
        border-radius: 12px;
      }
      /* Tablo → kart görünümü (mobil) */
      .sekme-icerik table { display: block; }
      .sekme-icerik thead { display: none; }
      .sekme-icerik tbody, .sekme-icerik tr { display: block; }
      .sekme-icerik tr {
        background: var(--surface);
        border: 1px solid var(--stroke);
        border-radius: 12px;
        margin-bottom: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,.04);
      }
      .sekme-icerik td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 8px 0;
        border: none;
        gap: 12px;
      }
      .sekme-icerik td:not(:last-child) { border-bottom: 1px solid var(--stroke); }
      .sekme-icerik td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--muted);
        font-size: 12px;
        flex-shrink: 0;
        min-width: 100px;
      }
      .sekme-icerik td:first-child { padding-top: 0; }
      .sekme-icerik td:last-child { padding-bottom: 0; border-bottom: none; }
      .sekme-icerik td:has(table) { flex-direction: column; align-items: stretch; }
      .sekme-icerik td:has(table)::before { margin-bottom: 8px; }
      .sekme-icerik .loading, .sekme-icerik .bos, .sekme-icerik .hata { padding: 32px 16px; }
      /* İç içe tablolar (aidat) mobil */
      .sekme-icerik table table {
        margin-top: 8px;
        font-size: 13px;
      }
      .sekme-icerik table table tr {
        padding: 10px;
        margin-bottom: 8px;
      }
      .sekme-icerik table table td::before { min-width: 70px; }
    }
  </style>

  <!-- Supabase (Auth + Database) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../src/supabase.js"></script>
  <script src="../src/supabase-auth-wrapper.js"></script>
  <script src="../src/supabase-db-wrapper.js"></script>

  <script>
    // Supabase Auth wrapper'ı hazırla ve app shell auth'u tetikle
    (function () {
      function initAuth() {
        if (typeof window.getSupabaseAuth === 'function') {
          window.auth = window.getSupabaseAuth();
          return true;
        }
        return false;
      }

      function waitAndTriggerInit() {
        if (typeof window.auth !== 'undefined' && window.auth && typeof window.initAppShellAuth === 'function') {
          try {
            window.initAppShellAuth();
          } catch (e) {
            console.error('initAppShellAuth hatası:', e);
          }
        } else if (typeof window.initAppShellAuth === 'function') {
          setTimeout(waitAndTriggerInit, 300);
        }
      }

      function bootstrap() {
        if (!initAuth()) {
          setTimeout(bootstrap, 200);
        } else {
          setTimeout(waitAndTriggerInit, 200);
        }
      }

      bootstrap();
    })();
  </script>

  <!-- Ortak JS -->
  <script src="../js/ortak.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var wrapper = document.getElementById('sekmeIcerik');
      var body = document.getElementById('sekmeIcerikBody');
      var btns = document.querySelectorAll('.nehari-sekmeler .sekme-btn');

      function setAktif(sekme) {
        btns.forEach(function(b) { b.classList.toggle('aktif', b.dataset.sekme === sekme); });
      }

      function tarihFmt(d) {
        if (!d) return '—';
        try {
          var x = new Date(d);
          return isNaN(x.getTime()) ? '—' : x.toLocaleDateString('tr-TR');
        } catch (_) { return '—'; }
      }
      function paraFmt(n) {
        if (n == null || isNaN(n)) return '—';
        return '₺' + Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function ayAd(ay) {
        var ad = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
        return ad[(ay || 1) - 1] || '';
      }

      async function loadTalebe() {
        body.className = 'loading';
        body.innerHTML = 'Yükleniyor...';
        wrapper.style.display = 'block';
        if (!window.supabase) { body.className = 'hata'; body.innerHTML = 'Bağlantı hazır değil.'; return; }
        try {
          var [tRes, aRes] = await Promise.all([
            window.supabase.from('nehari_talebeler').select('*').order('ad', { ascending: true }),
            window.supabase.from('nehari_aidat').select('talebe_id, aylik_tutar, baslangic_yil, baslangic_ay, bitis_yil, bitis_ay')
          ]);
          if (tRes.error) throw tRes.error;
          var data = tRes.data || [];
          var aidatMap = {};
          if (aRes.data) {
            var nowVal = new Date().getFullYear() * 12 + (new Date().getMonth() + 1);
            aRes.data.forEach(function(a) {
              var tid = a.talebe_id;
              if (!aidatMap[tid]) aidatMap[tid] = [];
              var bas = (a.baslangic_yil || 0) * 12 + (a.baslangic_ay || 1);
              var bit = (a.bitis_yil || 0) * 12 + (a.bitis_ay || 12);
              aidatMap[tid].push({ tutar: Number(a.aylik_tutar) || 0, coversNow: (nowVal >= bas && nowVal <= bit) });
            });
            Object.keys(aidatMap).forEach(function(k) {
              var p = aidatMap[k].find(function(x) { return x.coversNow; }) || aidatMap[k][0];
              aidatMap[k] = p ? p.tutar : 0;
            });
          }
          if (data.length === 0) {
            body.className = 'bos';
            body.innerHTML = 'Henüz talebe kaydı yok.';
            return;
          }
          var html = '<table><thead><tr><th>Sıra</th><th>Ad Soyad</th><th>Sınıf</th><th>Doğum Tarihi</th><th>Anne</th><th>Baba</th><th>Aidat</th><th>Durum</th></tr></thead><tbody>';
          data.forEach(function(r, i) {
            var aidat = aidatMap[r.id] != null ? paraFmt(aidatMap[r.id]) : '—';
            var durumKey = (r.durum === 'pasif') ? 'pasif' : 'aktif';
            var durumTxt = durumKey === 'pasif' ? 'Pasif' : 'Aktif';
            var adSoyad = (r.ad || '') + ' ' + (r.soyad || '');
            var sinifVal = r.sinif != null ? r.sinif : 0;
            var sinifTxt = sinifVal ? sinifVal + '. Sınıf' : '—';
            var sinifClass = 'badge-sinif sinif-' + (sinifVal >= 1 && sinifVal <= 12 ? sinifVal : 0);
            var durumClass = 'badge-durum durum-' + durumKey;
            html += '<tr><td data-label="Sıra">' + (i+1) + '</td><td data-label="Ad Soyad"><strong>' + adSoyad + '</strong></td><td data-label="Sınıf"><span class="' + sinifClass + '">' + sinifTxt + '</span></td><td data-label="Doğum Tarihi">' + tarihFmt(r.dogum_tarihi) + '</td><td data-label="Anne">' + (r.anne_adi || '—') + '</td><td data-label="Baba">' + (r.baba_adi || '—') + '</td><td data-label="Aidat">' + aidat + '</td><td data-label="Durum"><span class="' + durumClass + '">' + durumTxt + '</span></td></tr>';
          });
          body.className = '';
          body.innerHTML = html + '</tbody></table>';
        } catch (err) {
          body.className = 'hata';
          body.innerHTML = 'Yükleme hatası: ' + (err.message || err);
        }
      }

      async function loadAidat() {
        body.className = 'loading';
        body.innerHTML = 'Yükleniyor...';
        wrapper.style.display = 'block';
        if (!window.supabase) { body.className = 'hata'; body.innerHTML = 'Bağlantı hazır değil.'; return; }
        try {
          var [aRes, oRes, tRes] = await Promise.all([
            window.supabase.from('nehari_aidat').select('*'),
            window.supabase.from('nehari_aidat_odemeler').select('*'),
            window.supabase.from('nehari_talebeler').select('id, ad, soyad')
          ]);
          if (aRes.error) throw aRes.error;
          var aidatlar = aRes.data || [];
          var odemeler = oRes.data || [];
          var talebeler = (tRes.data || []).reduce(function(acc, t) { acc[t.id] = (t.ad || '') + ' ' + (t.soyad || ''); return acc; }, {});
          var oByT = {};
          odemeler.forEach(function(o) {
            var k = o.talebe_id + '_' + o.yil + '_' + o.ay;
            if (!oByT[k]) oByT[k] = 0;
            oByT[k] += Number(o.tutar) || 0;
          });
          if (aidatlar.length === 0) {
            body.className = 'bos';
            body.innerHTML = 'Henüz aidat planı yok.';
            return;
          }
          var html = '<table><thead><tr><th>Talebe</th><th>Aylık</th><th>Dönem</th><th>Ay Bazlı Durum</th></tr></thead><tbody>';
          aidatlar.forEach(function(a) {
            var adSoyad = talebeler[a.talebe_id] || '—';
            var donem = ayAd(a.baslangic_ay) + ' ' + a.baslangic_yil + ' – ' + ayAd(a.bitis_ay) + ' ' + a.bitis_yil;
            var aylik = Number(a.aylik_tutar) || 0;
            var by = a.baslangic_yil, bm = a.baslangic_ay, ey = a.bitis_yil, em = a.bitis_ay;
            var rows = [];
            for (var y = by; y <= ey; y++) {
              var mS = (y === by) ? bm : 1, mE = (y === ey) ? em : 12;
              for (var m = mS; m <= mE; m++) {
                var k = a.talebe_id + '_' + y + '_' + m;
                var top = oByT[k] || 0;
                var lbl = ayAd(m) + ' ' + y;
                var durumKey = top >= aylik - 0.01 ? 'tam' : top > 0 ? 'eksik' : 'alinmadi';
                var durumTxt = durumKey === 'tam' ? 'Tam' : durumKey === 'eksik' ? 'Eksik' : 'Alınmadı';
                var aidatClass = 'badge-aidat aidat-' + durumKey;
                rows.push('<tr><td data-label="Ay">' + lbl + '</td><td data-label="Beklenen">' + paraFmt(aylik) + '</td><td data-label="Ödenen">' + paraFmt(top) + '</td><td data-label="Durum"><span class="' + aidatClass + '">' + durumTxt + '</span></td></tr>');
              }
            }
            var sub = rows.length ? '<table style="font-size:13px;margin:0"><tr><th>Ay</th><th>Beklenen</th><th>Ödenen</th><th>Durum</th></tr>' + rows.join('') + '</table>' : '—';
            html += '<tr><td data-label="Talebe"><strong>' + adSoyad + '</strong></td><td data-label="Aylık">' + paraFmt(aylik) + '</td><td data-label="Dönem">' + donem + '</td><td data-label="Ay Bazlı Durum">' + sub + '</td></tr>';
          });
          body.className = '';
          body.innerHTML = html + '</tbody></table>';
        } catch (err) {
          body.className = 'hata';
          body.innerHTML = 'Yükleme hatası: ' + (err.message || err);
        }
      }

      async function loadYoklama() {
        body.className = 'loading';
        body.innerHTML = 'Yükleniyor...';
        wrapper.style.display = 'block';
        if (!window.supabase) { body.className = 'hata'; body.innerHTML = 'Bağlantı hazır değil.'; return; }
        var bugun = new Date().toISOString().split('T')[0];
        try {
          var gunRes = await window.supabase.from('nehari_yoklama_gunleri').select('siniflar, yoklama_acik').eq('tarih', bugun).maybeSingle();
          if (gunRes.error) throw gunRes.error;
          var gunData = gunRes.data;
          if (!gunData || !gunData.yoklama_acik) {
            body.className = 'bos';
            body.innerHTML = '<strong>' + tarihFmt(bugun) + '</strong> için yoklama açık değil. Yönetim sayfasından yoklamayı açın.';
            return;
          }
          var siniflar = gunData.siniflar || [];
          if (siniflar.length === 0) {
            body.className = 'bos';
            body.innerHTML = '<strong>' + tarihFmt(bugun) + '</strong> için sınıf seçilmemiş.';
            return;
          }
          var tRes = await window.supabase.from('nehari_talebeler').select('id, ad, soyad, sinif').in('sinif', siniflar).neq('durum', 'pasif').order('sinif').order('ad');
          if (tRes.error) throw tRes.error;
          var talebeler = tRes.data || [];
          if (talebeler.length === 0) {
            body.className = 'bos';
            body.innerHTML = 'Bu sınıflarda aktif talebe yok.';
            return;
          }
          var tIds = talebeler.map(function(t) { return t.id; });
          var kRes = await window.supabase.from('nehari_yoklama_kayitlari').select('talebe_id, durum').eq('tarih', bugun).in('talebe_id', tIds);
          if (kRes.error) throw kRes.error;
          var kayitMap = {};
          (kRes.data || []).forEach(function(k) { kayitMap[k.talebe_id] = k.durum; });

          var html = '<div class="yoklama-baslik"><span class="yoklama-tarih">' + tarihFmt(bugun) + ' — Yoklama</span></div>';
          talebeler.forEach(function(t) {
            var adSoyad = (t.ad || '') + ' ' + (t.soyad || '');
            var secili = kayitMap[t.id] || 'gelmedi';
            var sCls = ' sinif-' + (t.sinif >= 1 && t.sinif <= 12 ? t.sinif : 0);
            html += '<div class="yoklama-satir" data-talebe="' + t.id + '">';
            html += '<span class="ad-soyad">' + adSoyad + '</span><span class="badge-sinif sinif-badge' + sCls + '">' + (t.sinif != null ? t.sinif + '. Sınıf' : '—') + '</span>';
            html += '<div class="yoklama-secenekler">';
            ['geldi','gelmedi','izinli'].forEach(function(d) {
              var lbl = d === 'geldi' ? 'Geldi' : d === 'gelmedi' ? 'Gelmedi' : 'İzinli';
              var cls = secili === d ? ' yoklama-opt secili-' + d : ' yoklama-opt';
              html += '<button type="button" class="' + cls + '" data-durum="' + d + '">' + lbl + '</button>';
            });
            html += '</div></div>';
          });
          body.className = '';
          body.innerHTML = html;

          body.querySelectorAll('.yoklama-opt').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var satir = this.closest('.yoklama-satir');
              var talebeId = satir.dataset.talebe;
              var durum = this.dataset.durum;
              satir.querySelectorAll('.yoklama-opt').forEach(function(b) { b.classList.remove('secili-geldi','secili-gelmedi','secili-izinli'); });
              this.classList.add('secili-' + durum);
              kaydetYoklama(bugun, talebeId, durum);
            });
          });
        } catch (err) {
          body.className = 'hata';
          body.innerHTML = 'Yükleme hatası: ' + (err.message || err);
        }
      }

      async function kaydetYoklama(tarih, talebeId, durum) {
        if (!window.supabase) return;
        try {
          var res = await window.supabase.from('nehari_yoklama_kayitlari').upsert({
            tarih: tarih,
            talebe_id: talebeId,
            durum: durum,
            updated_at: new Date().toISOString()
          }, { onConflict: 'tarih,talebe_id' });
          if (res.error) throw res.error;
          if (typeof window.showToast === 'function') window.showToast('success', 'Kaydedildi', 'Yoklama güncellendi.');
        } catch (err) {
          if (typeof window.showToast === 'function') window.showToast('error', 'Hata', err.message || err);
          else alert('Hata: ' + (err.message || err));
        }
      }

      function loadEzber() {
        wrapper.style.display = 'block';
        body.className = 'bos';
        body.innerHTML = 'Ezber verisi henüz hazırlanmıyor.';
      }

      btns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var sekme = this.dataset.sekme;
          setAktif(sekme);
          if (sekme === 'talebe') loadTalebe();
          else if (sekme === 'aidat') loadAidat();
          else if (sekme === 'yoklama') loadYoklama();
          else if (sekme === 'ezber') loadEzber();
        });
      });
    });
  </script>
</head>
<body>
