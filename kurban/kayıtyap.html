<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kurban | İhvan / Ahavat Kayıt</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <link rel="stylesheet" href="../css/app-shell.css" />
  <style>
    body { padding-top: var(--appbar-h) !important; overflow-x: hidden; overflow-y: auto; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
    .page-head { margin-bottom: 18px; }
    .page-head h1 { margin: 0 0 6px; font-size: 1.35rem; font-weight: 800; color: var(--ink); }
    .page-head p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.45; }
    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow); }
    .seg { display: flex; gap: 8px; margin-bottom: 18px; }
    .seg button {
      flex: 1; padding: 12px 14px; border-radius: 12px; border: 2px solid var(--stroke);
      background: var(--surface); font: inherit; font-weight: 700; font-size: 14px; cursor: pointer; color: var(--muted);
    }
    .seg button.active { border-color: var(--brand); background: rgba(50, 73, 96, 0.08); color: var(--brand); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 6px; }
    .field input, .field textarea {
      width: 100%; box-sizing: border-box; min-height: 44px; padding: 0 12px; border: 1px solid var(--stroke);
      border-radius: 10px; font: inherit; font-size: 15px; background: var(--card); color: var(--ink);
    }
    .field textarea { min-height: 72px; padding: 10px 12px; resize: vertical; }
    .field .hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.35; }
    .field.hidden { display: none; }
    .adet-readonly { background: var(--surface) !important; color: var(--muted); }
    .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary { padding: 12px 20px; border-radius: 12px; border: none; background: var(--brand); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { padding: 12px 18px; border-radius: 12px; border: 1px solid var(--stroke); background: var(--surface); font-weight: 600; cursor: pointer; color: var(--ink); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../src/supabase.js"></script>
  <script src="../src/supabase-auth-wrapper.js"></script>
  <script src="../src/supabase-db-wrapper.js"></script>
  <script>
    (function () {
      function initAuth() {
        if (typeof window.getSupabaseAuth === 'function') {
          window.auth = window.getSupabaseAuth();
          return true;
        }
        return false;
      }
      function waitAndTriggerInit() {
        if (typeof window.auth !== 'undefined' && window.auth && typeof window.initAppShellAuth === 'function') {
          try { window.initAppShellAuth(); } catch (e) { console.error('initAppShellAuth:', e); }
        } else if (typeof window.initAppShellAuth === 'function') { setTimeout(waitAndTriggerInit, 300); }
      }
      function bootstrap() {
        if (!initAuth()) setTimeout(bootstrap, 200);
        else setTimeout(waitAndTriggerInit, 200);
      }
      bootstrap();
    })();
  </script>
  <script src="../js/ortak.js"></script>
</head>
<body>
  <div class="appbar">
    <div class="brand" onclick="location.href='../panel.html'">
      <img src="../img/logo.png" alt="logo"><span>KARAAĞAÇ FATİH</span>
    </div>
    <nav class="nav-center"><ul class="nav-list" id="navMain"></ul></nav>
    <div class="nav-right">
      <button class="btn hamb" id="hamburger" title="Menü">☰</button>
      <div class="nav-item">
        <button class="iconbtn" id="btnProfile" title="Profil">
          <span class="avatar"></span> <span id="profName" class="muted">Profil</span>
        </button>
        <div class="dropdown drop-right" id="profDropdown">
          <a href="../diger/kullanici-yonetimi.html">👤 Profil</a>
          <a href="../diger/sistem-ayarlari.html">⚙️ Sistem Ayarları</a>
          <a href="#" id="btnLogout">🚪 Çıkış Yap</a>
        </div>
      </div>
    </div>
  </div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast-container" id="toastContainer"></div>

  <main class="wrap">
    <div class="page-head">
      <h1>Adım 1 — İhvan / Ahavat kaydı</h1>
      <p>Kurum, kişi, telefon ve adet bilgisi kayıt altına alınır.</p>
    </div>

    <div class="card">
      <div class="seg" role="tablist" aria-label="Kayıt türü">
        <button type="button" id="btnTurIhvan" class="active" data-tur="ihvan" role="tab" aria-selected="true">İhvan</button>
        <button type="button" id="btnTurAhavat" data-tur="ahavat" role="tab" aria-selected="false">Ahavat</button>
      </div>

      <form id="formKayit" autocomplete="on">
        <div class="field">
          <label for="kurumAdi">Kurum adı</label>
          <input type="text" id="kurumAdi" name="kurumAdi" required maxlength="200" placeholder="Örn. Dernek / şube adı" />
        </div>
        <div class="field">
          <label for="adSoyad">Adı soyadı</label>
          <input type="text" id="adSoyad" name="adSoyad" required maxlength="200" placeholder="Kayıt yapılan kişi" />
        </div>
        <div class="field" id="fieldTelefon">
          <label for="telefon">Telefon no</label>
          <input type="tel" id="telefon" name="telefon" inputmode="tel" maxlength="20" placeholder="90 ile 12 hane (İhvan için zorunlu)" />
          <p class="hint" id="telefonHint">İhvan: telefon zorunlu. Örn. 905551234567 veya 05551234567</p>
        </div>
        <div class="field hidden" id="fieldAdet">
          <label for="adet">Adet</label>
          <input type="number" id="adet" name="adet" min="1" max="999" step="1" value="1" />
        </div>
        <div class="field" id="fieldAdetIhvan">
          <label for="adetIhvanGoster">Adet</label>
          <input type="text" id="adetIhvanGoster" class="adet-readonly" readonly value="1" aria-readonly="true" />
          <p class="hint">İhvan kaydında adet her zaman 1.</p>
        </div>
        <div class="field">
          <label for="notlar">Not (isteğe bağlı)</label>
          <textarea id="notlar" name="notlar" maxlength="500" placeholder="Ek açıklama"></textarea>
        </div>
        <div class="actions">
          <button type="submit" class="btn-primary" id="btnKaydet">Kaydet</button>
          <button type="button" class="btn-ghost" id="btnTemizle">Formu temizle</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    (function () {
      const TR_PHONE_RE = /^90[0-9]{10}$/;

      function normalizeTrPhone(raw) {
        let t = (raw || '').replace(/\s/g, '');
        if (!t) return '';
        if (t.startsWith('90') && t.length === 12) return t;
        if (t.startsWith('0') && t.length === 11) return '90' + t.slice(1);
        if (/^5[0-9]{9}$/.test(t)) return '90' + t;
        return t;
      }

      let kayitTur = 'ihvan';

      const btnIhvan = document.getElementById('btnTurIhvan');
      const btnAhavat = document.getElementById('btnTurAhavat');
      const fieldAdet = document.getElementById('fieldAdet');
      const fieldAdetIhvan = document.getElementById('fieldAdetIhvan');
      const telefonEl = document.getElementById('telefon');
      const telefonHint = document.getElementById('telefonHint');
      const adetEl = document.getElementById('adet');
      const form = document.getElementById('formKayit');

      function applyTurUI() {
        const ihvan = kayitTur === 'ihvan';
        btnIhvan.classList.toggle('active', ihvan);
        btnAhavat.classList.toggle('active', !ihvan);
        btnIhvan.setAttribute('aria-selected', ihvan ? 'true' : 'false');
        btnAhavat.setAttribute('aria-selected', ihvan ? 'false' : 'true');
        telefonEl.required = ihvan;
        fieldAdet.classList.toggle('hidden', ihvan);
        fieldAdetIhvan.classList.toggle('hidden', !ihvan);
        if (ihvan) {
          telefonHint.textContent = 'İhvan: telefon zorunlu. Örn. 905551234567 veya 05551234567';
        } else {
          telefonHint.textContent = 'Ahavat: telefon boş bırakılabilir. Dolu ise 90 ile 12 hane olmalıdır.';
        }
      }

      btnIhvan.addEventListener('click', () => { kayitTur = 'ihvan'; applyTurUI(); });
      btnAhavat.addEventListener('click', () => { kayitTur = 'ahavat'; applyTurUI(); });
      applyTurUI();

      document.getElementById('btnTemizle').addEventListener('click', () => {
        form.reset();
        kayitTur = 'ihvan';
        applyTurUI();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const sb = window.supabase;
        if (!sb) {
          showToast('error', 'Hata', 'Supabase bağlantısı kurulamadı.');
          return;
        }

        const kurumAdi = (document.getElementById('kurumAdi').value || '').trim();
        const adSoyad = (document.getElementById('adSoyad').value || '').trim();
        const notlar = (document.getElementById('notlar').value || '').trim();
        const telRaw = (telefonEl.value || '').trim();
        const telNorm = normalizeTrPhone(telRaw);

        if (!kurumAdi || !adSoyad) {
          showToast('warning', 'Eksik', 'Kurum adı ve ad soyad zorunludur.');
          return;
        }

        if (kayitTur === 'ihvan') {
          if (!telNorm || !TR_PHONE_RE.test(telNorm)) {
            showToast('warning', 'Telefon', 'İhvan kaydı için geçerli bir telefon girin (90 + 10 hane).');
            return;
          }
        } else {
          if (telNorm && !TR_PHONE_RE.test(telNorm)) {
            showToast('warning', 'Telefon', 'Telefon dolu ise 90 ile 12 hane olmalıdır.');
            return;
          }
        }

        let adet = 1;
        if (kayitTur === 'ahavat') {
          adet = parseInt(String(adetEl.value || '1'), 10);
          if (!Number.isFinite(adet) || adet < 1) {
            showToast('warning', 'Adet', 'Adet en az 1 olmalıdır.');
            return;
          }
        }

        const btnKaydet = document.getElementById('btnKaydet');
        btnKaydet.disabled = true;

        try {
          const { data: { user }, error: userErr } = await sb.auth.getUser();
          if (userErr || !user) throw new Error('Oturum bulunamadı.');

          const now = new Date();
          const yil = now.getFullYear();

          const payload = {
            created_by_uid: user.id,
            kayit_tipi: kayitTur,
            kurum_adi: kurumAdi,
            ad_soyad: adSoyad,
            telefon: telNorm || null,
            adet: adet,
            aciklama: notlar || null,
            yil: yil
          };

          const { error: insErr } = await sb.from('ihvan_ahavat').insert(payload).select('id');
          if (insErr) throw insErr;

          showToast('success', 'Kaydedildi', kayitTur === 'ihvan' ? 'İhvan kaydı alındı.' : 'Ahavat kaydı alındı.');
          document.getElementById('kurumAdi').value = '';
          document.getElementById('adSoyad').value = '';
          telefonEl.value = '';
          document.getElementById('notlar').value = '';
          adetEl.value = '1';
        } catch (err) {
          console.error(err);
          const msg = (err && err.message) ? err.message : String(err);
          showToast('error', 'Kayıt', msg + (msg.includes('policy') || msg.includes('RLS') ? ' Yetkiniz olmayabilir (RLS).' : ''));
        } finally {
          btnKaydet.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
